<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moirai — Diagnosis Report</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap');

:root {
  --bg: #08090c; --surface: #0f1115; --surface-2: #161a1f;
  --border: #1e2328; --border-bright: #2a3038;
  --text: #c8cdd3; --text-dim: #6b737d; --text-bright: #e8ecf0;
  --green: #2dd4a0; --green-dim: rgba(45,212,160,0.10);
  --red: #f0566a; --red-dim: rgba(240,86,106,0.10);
  --amber: #e8b84a; --amber-dim: rgba(232,184,74,0.10);
  --cyan: #56b8e0; --cyan-dim: rgba(86,184,224,0.10);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 40px 40px;
}
.container { max-width: 1400px; margin: 0 auto; padding: 32px 24px; position: relative; z-index: 1; }

/* Header */
.header { margin-bottom: 28px; }
.header-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }
.header h1 { font-family: 'Instrument Serif', serif; font-size: 30px; font-weight: 400; color: var(--text-bright); }
.header h1 em { font-style: italic; color: var(--cyan); }

/* Stats */
.stats-bar {
  display: flex; gap: 20px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; font-size: 11px; color: var(--text-dim); margin-bottom: 20px; flex-wrap: wrap;
}
.stats-bar .val { color: var(--text-bright); font-weight: 500; }

/* Nav */
.nav { display: flex; gap: 2px; margin-bottom: 20px; }
.nav-tab {
  padding: 10px 20px; font-size: 12px; font-family: 'DM Mono', monospace;
  background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
  cursor: pointer; transition: all 0.15s ease; border-radius: 6px;
}
.nav-tab:hover { color: var(--text); border-color: var(--border-bright); }
.nav-tab.active { color: var(--cyan); border-color: var(--cyan); background: var(--cyan-dim); }
.nav-tab .tab-sub { font-size: 10px; display: block; margin-top: 2px; color: var(--text-dim); }

/* Panels */
.panel { display: none; } .panel.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

/* Task pills */
.task-select { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.task-pill {
  padding: 5px 12px; font-size: 11px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; cursor: pointer; color: var(--text-dim); transition: all 0.15s;
}
.task-pill:hover { border-color: var(--border-bright); color: var(--text); }
.task-pill.active { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); }
.pill-meta { font-size: 10px; opacity: 0.7; }

/* Card */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
.card-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.card-title { font-size: 12px; font-weight: 500; color: var(--text-bright); }
.card-meta { font-size: 10px; color: var(--text-dim); }
.card-body { padding: 20px 18px; }

/* === FUNNEL (SVG-based like Mockup C) === */
.funnel-svg { width: 100%; display: block; }
.fn-node { transition: filter 0.15s; } .fn-node:hover { filter: brightness(1.15); }
.fn-rect { rx: 8; ry: 8; }
.fn-label { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; text-anchor: middle; dominant-baseline: central; }
.fn-sub { font-family: 'DM Mono', monospace; font-size: 10px; text-anchor: middle; dominant-baseline: central; fill: var(--text-dim); }
.fn-rate { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; text-anchor: middle; dominant-baseline: central; }
.fn-rate-label { font-family: 'DM Mono', monospace; font-size: 9px; text-anchor: middle; dominant-baseline: central; fill: var(--text-dim); }
.fn-anno { font-family: 'Instrument Serif', serif; font-size: 12px; font-style: italic; text-anchor: middle; dominant-baseline: central; }
.fn-flow { fill-opacity: 0.12; stroke-width: 1; }
.fn-connector { fill: none; stroke-width: 1.5; stroke-dasharray: 4,3; opacity: 0.4; }
.fn-badge { rx: 14; ry: 14; }

/* Insight bar */
.insight { padding: 12px 16px; border-left: 3px solid var(--cyan); background: var(--surface-2); border-radius: 0 8px 8px 0; font-size: 12px; line-height: 1.6; margin-top: 12px; }

/* === TRANSITIONS === */
.trans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.trans-edge {
  padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center; cursor: default; transition: border-color 0.15s;
}
.trans-edge:hover { border-color: var(--border-bright); }
.trans-path { font-size: 12px; } .trans-arrow { color: var(--text-dim); margin: 0 6px; }
.trans-rate { font-size: 14px; font-weight: 500; } .trans-lift { font-size: 10px; margin-left: 4px; }
.trans-count { font-size: 10px; color: var(--text-dim); }
.edge-green { background: var(--green-dim); } .edge-green .trans-rate, .edge-green .trans-lift { color: var(--green); }
.edge-red { background: var(--red-dim); } .edge-red .trans-rate, .edge-red .trans-lift { color: var(--red); }
.edge-neutral { background: var(--surface-2); } .edge-neutral .trans-rate { color: var(--text); }
.trans-section { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin: 14px 0 8px; display: flex; align-items: center; gap: 6px; }
.trans-baseline { font-size: 11px; color: var(--text-dim); margin-bottom: 14px; }

/* === STRIPS === */
.strip-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
.strip-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
.strip-row { display: flex; align-items: center; height: 12px; margin-bottom: 1px; }
.strip-border { width: 3px; height: 100%; border-radius: 1px; margin-right: 2px; flex-shrink: 0; }
.strip-cells { display: flex; gap: 1px; flex: 1; }
.strip-cell { height: 10px; border-radius: 2px; flex: 1; max-width: 22px; min-width: 5px; cursor: default; transition: transform 0.1s; }
.strip-cell:hover { transform: scaleY(2.2); filter: brightness(1.3); z-index: 10; }
.strip-sep { height: 1px; background: var(--border); margin: 6px 0; }
.strip-legend { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; font-size: 10px; color: var(--text-dim); }
.strip-legend-item { display: flex; align-items: center; gap: 4px; }
.strip-legend-color { width: 10px; height: 10px; border-radius: 2px; }

/* Tooltip */
.tooltip { position: fixed; background: #1a1f25; border: 1px solid var(--border); border-radius: 5px; padding: 4px 8px; font-size: 10px; color: var(--text-bright); pointer-events: none; z-index: 100; display: none; white-space: nowrap; }
</style>
</head>
<body>
<div x-data="reportApp()" class="container">

  <div class="header">
    <div class="header-label">Moirai / Diagnosis Report</div>
    <h1>Trajectory <em>decision analysis</em></h1>
  </div>

  <div class="stats-bar">
    <div><span class="val" x-text="data.summary.total_runs"></span> runs</div>
    <div><span class="val" x-text="data.summary.total_tasks"></span> tasks</div>
    <div><span class="val" x-text="data.summary.mixed_outcome_tasks"></span> mixed-outcome</div>
    <div><span class="val" x-text="pct(data.summary.pass_rate)"></span> overall pass rate</div>
  </div>

  <div class="nav">
    <div class="nav-tab" :class="{ active: tab === 'funnel' }" @click="tab = 'funnel'">
      Decision Funnel<span class="tab-sub">per-task decision points</span>
    </div>
    <div class="nav-tab" :class="{ active: tab === 'transitions' }" @click="tab = 'transitions'">
      Transition Map<span class="tab-sub">which patterns predict success</span>
    </div>
    <div class="nav-tab" :class="{ active: tab === 'strips' }" @click="tab = 'strips'">
      Trajectory Strips<span class="tab-sub">raw aligned evidence</span>
    </div>
  </div>

  <!-- ========== FUNNEL ========== -->
  <div class="panel" :class="{ active: tab === 'funnel' }">
    <template x-if="data.tasks.length > 0">
      <div>
        <div class="task-select">
          <template x-for="(t, i) in data.tasks" :key="i">
            <div class="task-pill" :class="{ active: taskIdx === i }" @click="taskIdx = i">
              <span x-text="shortTask(t.funnel.task_id)"></span>
              <span class="pill-meta" x-text="t.funnel.pass_count + 'P/' + t.funnel.fail_count + 'F'"></span>
            </div>
          </template>
        </div>
        <div class="card">
          <div class="card-head">
            <div class="card-title" x-text="currentTask.funnel.task_id"></div>
            <div class="card-meta" x-text="currentTask.funnel.total_runs + ' runs'"></div>
          </div>
          <div class="card-body" x-html="renderFunnel(currentTask.funnel)"></div>
        </div>
      </div>
    </template>
    <template x-if="data.tasks.length === 0">
      <div class="card"><div class="card-body" style="color:var(--text-dim)">No mixed-outcome tasks found.</div></div>
    </template>
  </div>

  <!-- ========== TRANSITIONS ========== -->
  <div class="panel" :class="{ active: tab === 'transitions' }">
    <div class="card">
      <div class="card-head">
        <div class="card-title">Step transitions that predict outcomes</div>
        <div class="card-meta" x-text="data.transitions.total_runs + ' runs analyzed · baseline ' + pct(data.transitions.baseline_pass_rate)"></div>
      </div>
      <div class="card-body" x-html="renderTransitions(data.transitions)"></div>
    </div>
  </div>

  <!-- ========== STRIPS ========== -->
  <div class="panel" :class="{ active: tab === 'strips' }">
    <template x-if="data.tasks.length > 0">
      <div>
        <div class="task-select">
          <template x-for="(t, i) in data.tasks" :key="i">
            <div class="task-pill" :class="{ active: taskIdx === i }" @click="taskIdx = i">
              <span x-text="shortTask(t.strips.task_id)"></span>
              <span class="pill-meta" x-text="t.strips.pass_strips.length+'P/'+t.strips.fail_strips.length+'F'"></span>
            </div>
          </template>
        </div>
        <div class="card">
          <div class="card-head">
            <div class="card-title" x-text="currentTask.strips.task_id"></div>
            <div class="card-meta" x-text="(currentTask.strips.pass_strips.length+currentTask.strips.fail_strips.length)+' runs'"></div>
          </div>
          <div class="card-body">
            <div class="strip-label" style="color:var(--green)">
              <span class="strip-dot" style="background:var(--green)"></span>
              PASS (<span x-text="currentTask.strips.pass_strips.length"></span> runs)
            </div>
            <template x-for="strip in currentTask.strips.pass_strips" :key="strip.run_id">
              <div class="strip-row">
                <div class="strip-border" style="background:var(--green)"></div>
                <div class="strip-cells">
                  <template x-for="(cell, ci) in strip.cells" :key="ci">
                    <div class="strip-cell" :style="'background:'+stepColor(cell.type)"
                         @mouseenter="showTip($event, cell.name+' (step '+(ci+1)+')')"
                         @mouseleave="hideTip()"></div>
                  </template>
                </div>
              </div>
            </template>
            <div class="strip-sep"></div>
            <div class="strip-label" style="color:var(--red)">
              <span class="strip-dot" style="background:var(--red)"></span>
              FAIL (<span x-text="currentTask.strips.fail_strips.length"></span> runs)
            </div>
            <template x-for="strip in currentTask.strips.fail_strips" :key="strip.run_id">
              <div class="strip-row">
                <div class="strip-border" style="background:var(--red)"></div>
                <div class="strip-cells">
                  <template x-for="(cell, ci) in strip.cells" :key="ci">
                    <div class="strip-cell" :style="'background:'+stepColor(cell.type)"
                         @mouseenter="showTip($event, cell.name+' (step '+(ci+1)+')')"
                         @mouseleave="hideTip()"></div>
                  </template>
                </div>
              </div>
            </template>
            <div class="strip-legend">
              <template x-for="[name, color] in stepLegend" :key="name">
                <div class="strip-legend-item">
                  <div class="strip-legend-color" :style="'background:'+color"></div>
                  <span x-text="name"></span>
                </div>
              </template>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>

</div>
<div class="tooltip" id="tip"></div>

<script>
const COLORS = { green:'#2dd4a0', red:'#f0566a', amber:'#e8b84a', cyan:'#56b8e0', dim:'#6b737d' };
const COLORS_DIM = { green:'rgba(45,212,160,0.10)', red:'rgba(240,86,106,0.10)', amber:'rgba(232,184,74,0.10)', cyan:'rgba(86,184,224,0.10)', dim:'rgba(107,115,125,0.10)' };
const STEP_COLORS = { search:'#4a7dbd', read:'#5ba8c8', edit:'#d4a24a', test:'#2dd4a0', bash:'#9570d4', submit:'#6b737d', write:'#40b89a', reason:'#8a7060', finish:'#6b737d', glob:'#4a7dbd', grep:'#4a7dbd' };

function reportApp() {
  return {
    data: "__REPORT_DATA__",
    tab: 'funnel', taskIdx: 0,

    get currentTask() { return this.data.tasks[this.taskIdx] || this.data.tasks[0] || {funnel:{nodes:[],task_id:'',total_runs:0,pass_count:0,fail_count:0,pass_rate:0},strips:{task_id:'',pass_strips:[],fail_strips:[]}}; },
    get successEdges() { return (this.data.transitions.edges||[]).filter(e=>e.color==='green').slice(0,8); },
    get failureEdges() { return (this.data.transitions.edges||[]).filter(e=>e.color==='red').slice(0,8); },
    get stepLegend() { return Object.entries(STEP_COLORS).filter(([k])=>!['glob','grep'].includes(k)); },

    pct(v) { return v!=null ? Math.round(v*100)+'%' : '\u2014'; },
    shortTask(t) { if(!t) return ''; const p=t.split('__'); return (p.length>1?p[1]:t).substring(0,28); },
    stepColor(t) { return STEP_COLORS[t]||'#3a3f45'; },
    showTip(e,text) { const t=document.getElementById('tip'); t.textContent=text; t.style.display='block'; t.style.left=(e.clientX+10)+'px'; t.style.top=(e.clientY-20)+'px'; },
    hideTip() { document.getElementById('tip').style.display='none'; },

    renderTransitions(trans) {
      const edges = trans.edges || [];
      if (!edges.length) return '<div style="color:var(--text-dim)">No significant transitions found.</div>';

      // Collect unique nodes and assign positions
      const nodeSet = new Set();
      edges.forEach(e => { nodeSet.add(e.source); nodeSet.add(e.target); });
      const allNodes = Array.from(nodeSet);

      // Group by role: explore left, modify center, verify right
      const explore = ['search', 'read', 'glob', 'grep'];
      const modify = ['edit', 'write', 'bash'];
      const verify = ['test', 'submit', 'finish', 'reason'];

      function nodeGroup(n) {
        if (explore.includes(n)) return 0;
        if (modify.includes(n)) return 1;
        return 2;
      }

      const groups = [[], [], []];
      allNodes.forEach(n => groups[nodeGroup(n)].push(n));
      // Sort nodes within each group for stable ordering
      const groupOrder = { search:0, read:1, glob:2, grep:3, edit:0, bash:1, write:2, test:0, submit:1, finish:2, reason:3 };
      groups.forEach(g => g.sort((a,b) => (groupOrder[a]||99) - (groupOrder[b]||99)));

      const nodeW = 140, nodeH = 50;
      const vertGap = nodeH + 30; // 80px between node tops
      const maxGroupLen = Math.max(...groups.map(g => g.length));
      const H = 50 + maxGroupLen * vertGap + 30; // auto-height
      const W = 900;
      const colX = [120, 420, 720];
      const positions = {};
      const colLabels = ['explore', 'modify', 'verify / submit'];
      const colLabelY = 28;
      const topMargin = 50;

      groups.forEach((grp, gi) => {
        const cx = colX[gi];
        const totalH = grp.length * vertGap - 30;
        const startY = topMargin + (maxGroupLen * vertGap - 30 - totalH) / 2;
        grp.forEach((n, ni) => {
          const y = startY + ni * vertGap;
          positions[n] = { x: cx - nodeW/2, y, cx, cy: y + nodeH/2 };
        });
      });

      let svg = '<svg class="funnel-svg" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';

      // Column labels
      const colColors = [COLORS.cyan, COLORS.amber, COLORS.green];
      colX.forEach((cx, i) => {
        if (groups[i].length === 0) return;
        svg += '<text x="'+cx+'" y="'+colLabelY+'" font-family="\'Instrument Serif\', serif" font-size="13" fill="'+colColors[i]+'" text-anchor="middle" font-style="italic">'+colLabels[i]+'</text>';
      });

      // Sort edges: neutral first (background), then colored (foreground)
      const sortedEdges = [...edges].sort((a,b) => {
        const order = {neutral: 0, green: 1, red: 1};
        return (order[a.color]||0) - (order[b.color]||0);
      });

      // Find top success and top failure edge for emphasis
      const topSuccess = edges.filter(e=>e.color==='green').sort((a,b)=>b.lift-a.lift)[0];
      const topFailure = edges.filter(e=>e.color==='red').sort((a,b)=>a.lift-b.lift)[0];

      // --- EDGES FIRST (behind nodes) ---
      // Collect badge positions to render after edges but before nodes
      const badges = [];

      // Track edges per source-target pair to offset overlaps
      const pairCount = {};
      sortedEdges.forEach((e, ei) => {
        const sp = positions[e.source], tp = positions[e.target];
        if (!sp || !tp) return;

        const isTop = (topSuccess && e.source===topSuccess.source && e.target===topSuccess.target) ||
                      (topFailure && e.source===topFailure.source && e.target===topFailure.target);
        const isColored = e.color === 'green' || e.color === 'red';
        const c = e.color === 'green' ? COLORS.green : (e.color === 'red' ? COLORS.red : '#6b737d');

        const opacity = isTop ? 0.85 : (isColored ? 0.45 : 0.12);
        const thickness = isTop ? 3.5 : (isColored ? 2 : 1.2);

        // Determine direction: forward (left→right) or backward (right→left)
        const forward = sp.cx < tp.cx - 50;
        const backward = sp.cx > tp.cx + 50;
        const sameCol = !forward && !backward;

        // Start/end points on node edges
        let sx, sy, tx, ty;
        if (forward) {
          sx = sp.x + nodeW; sy = sp.cy;  // right edge of source
          tx = tp.x; ty = tp.cy;           // left edge of target
        } else if (backward) {
          sx = sp.x; sy = sp.cy;           // left edge of source
          tx = tp.x + nodeW; ty = tp.cy;   // right edge of target
        } else {
          sx = sp.x + nodeW; sy = sp.cy;   // same col: loop right
          tx = tp.x + nodeW; ty = tp.cy;
        }

        // Unique key for overlap tracking
        const pairKey = e.source + '>' + e.target;
        pairCount[pairKey] = (pairCount[pairKey] || 0);
        const pairIdx = pairCount[pairKey]++;

        // Control points for cubic bezier
        let c1x, c1y, c2x, c2y;
        const vertSep = (sy + ty) / 2; // midpoint Y

        if (sameCol) {
          const loopR = 50 + pairIdx * 14;
          c1x = sx + loopR; c1y = sy;
          c2x = tx + loopR; c2y = ty;
        } else {
          const dist = Math.abs(tx - sx);
          const pull = dist * 0.3; // how far control points pull from endpoints
          const yOff = (pairIdx - 0.5) * 14; // slight vertical offset per duplicate pair
          if (forward) {
            c1x = sx + pull; c1y = sy + yOff;
            c2x = tx - pull; c2y = ty + yOff;
          } else {
            c1x = sx - pull; c1y = sy + yOff;
            c2x = tx + pull; c2y = ty + yOff;
          }
        }

        const path = 'M'+sx+','+sy+' C'+c1x+','+c1y+' '+c2x+','+c2y+' '+tx+','+ty;

        // Glow for top edges
        if (isTop) {
          svg += '<path d="'+path+'" fill="none" stroke="'+c+'" stroke-width="'+(thickness+5)+'" opacity="0.08" stroke-linecap="round"/>';
          svg += '<path d="'+path+'" fill="none" stroke="'+c+'" stroke-width="'+(thickness+2)+'" opacity="0.15" stroke-linecap="round"/>';
        }
        svg += '<path d="'+path+'" fill="none" stroke="'+c+'" stroke-width="'+thickness+'" opacity="'+opacity+'" stroke-linecap="round"/>';

        // Rate badge along the curve, offset from midpoint to avoid node overlap
        if (isColored) {
          // Place badge at t=0.3 (closer to source) for forward edges, t=0.5 for same-col
          const t = sameCol ? 0.5 : (forward ? 0.3 : 0.7);
          const bx = (1-t)*(1-t)*(1-t)*sx + 3*(1-t)*(1-t)*t*c1x + 3*(1-t)*t*t*c2x + t*t*t*tx;
          const by = (1-t)*(1-t)*(1-t)*sy + 3*(1-t)*(1-t)*t*c1y + 3*(1-t)*t*t*c2y + t*t*t*ty;
          badges.push({ x: bx, y: by, rate: Math.round(e.pass_rate * 100), color: c, isTop });
        }
      });

      // --- BADGES (between edges and nodes) ---
      // Deconflict overlapping badges: push apart vertically
      for (let i = 0; i < badges.length; i++) {
        for (let j = i + 1; j < badges.length; j++) {
          const dx = Math.abs(badges[i].x - badges[j].x);
          const dy = Math.abs(badges[i].y - badges[j].y);
          if (dx < 40 && dy < 22) {
            // Push apart vertically
            const pushDir = badges[i].y < badges[j].y ? -1 : 1;
            badges[i].y += pushDir * 12;
            badges[j].y -= pushDir * 12;
          }
        }
      }

      badges.forEach(b => {
        const bw = b.isTop ? 44 : 36;
        const bh = 20;
        const fs = b.isTop ? 11 : 9;
        svg += '<rect x="'+(b.x-bw/2)+'" y="'+(b.y-bh/2)+'" width="'+bw+'" height="'+bh+'" rx="'+bh/2+'" fill="#0f1115" stroke="'+b.color+'" stroke-width="'+(b.isTop?1.2:0.7)+'" opacity="0.95"/>';
        svg += '<text x="'+b.x+'" y="'+b.y+'" font-family="\'DM Mono\', monospace" font-size="'+fs+'" font-weight="500" fill="'+b.color+'" text-anchor="middle" dominant-baseline="central">'+b.rate+'%</text>';
      });

      // --- NODES ON TOP ---
      // Count edges per node to show as sublabel
      const nodeEdgeCount = {};
      edges.forEach(e => {
        nodeEdgeCount[e.source] = (nodeEdgeCount[e.source] || 0) + e.count;
        nodeEdgeCount[e.target] = (nodeEdgeCount[e.target] || 0) + e.count;
      });

      allNodes.forEach(n => {
        const p = positions[n];
        if (!p) return;
        const g = nodeGroup(n);
        const c = g === 0 ? COLORS.cyan : (g === 1 ? COLORS.amber : COLORS.green);
        const cd = g === 0 ? COLORS_DIM.cyan : (g === 1 ? COLORS_DIM.amber : COLORS_DIM.green);

        svg += '<g class="fn-node">';
        svg += '<rect class="fn-rect" x="'+p.x+'" y="'+p.y+'" width="'+nodeW+'" height="'+nodeH+'" fill="'+cd+'" stroke="'+c+'" stroke-width="1.5"/>';
        svg += '<text class="fn-label" x="'+p.cx+'" y="'+(p.cy)+'" fill="'+c+'" font-size="14">'+esc(n)+'</text>';
        svg += '</g>';
      });

      svg += '</svg>';
      return svg;
    },

    renderFunnel(funnel) {
      const nodes = funnel.nodes || [];
      const edges = funnel.edges || [];
      const byId = {}; nodes.forEach(n => byId[n.id] = n);
      const l0 = nodes.filter(n=>n.level===0);
      const l1 = nodes.filter(n=>n.level===1);
      const l2 = nodes.filter(n=>n.level===2);
      const start = l0[0] || {label:'all runs',count:0,pass_rate:0,color:'dim'};
      const W = 840;

      // Y positions for each tier
      const Y0 = 30, Y1 = 150, Y2 = 290, Y3 = 420, H = 560;
      const nodeH = 48, badgeH = 70, badgeR = 14;
      const nodeW = 200;

      function layoutRow(items, y) {
        const gap = 20;
        const total = items.length * nodeW + (items.length-1) * gap;
        const x0 = (W - total) / 2;
        return items.map((item, i) => ({...item, x: x0 + i*(nodeW+gap), y, w: nodeW}));
      }

      const laid1 = layoutRow(l1, Y1);
      const laid2 = layoutRow(l2, Y2);

      let svg = '<svg class="funnel-svg" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';

      // Helper: draw a node box
      function drawNode(n, x, y, w, h) {
        const c = COLORS[n.color||'dim'], cd = COLORS_DIM[n.color||'dim'];
        const cx = x + w/2;
        svg += '<g class="fn-node">';
        svg += '<rect class="fn-rect" x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+cd+'" stroke="'+c+'" stroke-width="1.5"/>';
        svg += '<text class="fn-label" x="'+cx+'" y="'+(y+18)+'" fill="'+c+'">'+esc(n.label)+'</text>';
        svg += '<text class="fn-sub" x="'+cx+'" y="'+(y+34)+'">'+esc(n.sublabel||n.count+' runs')+'</text>';
        svg += '</g>';
      }

      // Helper: draw a flow triangle between parent center and child box
      function drawFlow(px, py, cx, cy, cw, color) {
        const c = COLORS[color||'dim'];
        svg += '<path class="fn-flow" d="M'+(px-15)+','+py+' L'+cx+','+cy+' L'+(cx+cw)+','+cy+' L'+(px+15)+','+py+' Z" fill="'+c+'" stroke="'+c+'"/>';
      }

      // Helper: draw outcome badge (rounded rect with big %)
      function drawBadge(n, x, y, w) {
        const c = COLORS[n.color||'dim'], cd = COLORS_DIM[n.color||'dim'];
        const cx = x + w/2;
        const bw = 120, bx = cx - bw/2;
        svg += '<g class="fn-node">';
        svg += '<rect class="fn-badge" x="'+bx+'" y="'+y+'" width="'+bw+'" height="'+badgeH+'" fill="'+cd+'" stroke="'+c+'" stroke-width="2"/>';
        svg += '<text class="fn-rate" x="'+cx+'" y="'+(y+26)+'" fill="'+c+'">'+Math.round((n.pass_rate||0)*100)+'%</text>';
        svg += '<text class="fn-rate-label" x="'+cx+'" y="'+(y+42)+'">pass rate</text>';
        if (n.outcome_detail) svg += '<text class="fn-sub" x="'+cx+'" y="'+(y+56)+'">'+esc(n.outcome_detail)+'</text>';
        svg += '</g>';
        if (n.annotation) {
          svg += '<text class="fn-anno" x="'+cx+'" y="'+(y+badgeH+16)+'" fill="'+c+'">'+esc(n.annotation)+'</text>';
        }
      }

      // --- DRAW ---

      // Level 0: start node (wider)
      const startW = 280, startX = (W-startW)/2;
      drawNode(start, startX, Y0, startW, nodeH);

      // Dashed line + annotation
      svg += '<line x1="'+(W/2)+'" y1="'+(Y0+nodeH)+'" x2="'+(W/2)+'" y2="'+(Y0+nodeH+20)+'" stroke="'+COLORS.cyan+'" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>';
      svg += '<text class="fn-anno" x="'+(W/2)+'" y="'+(Y0+nodeH+34)+'" fill="'+COLORS.cyan+'">the decision that matters</text>';

      // Level 1: flows + nodes
      laid1.forEach(n => {
        drawFlow(W/2, Y0+nodeH, n.x, n.y, n.w, n.color);
        drawNode(n, n.x, n.y, n.w, nodeH);
      });

      // Level 2: flows from their parents + outcome badges
      laid2.forEach(n => {
        // Find parent via edges
        const parentEdge = edges.find(e => e.to === n.id);
        if (parentEdge) {
          const parent = laid1.find(p => p.id === parentEdge.from);
          if (parent) {
            drawFlow(parent.x + parent.w/2, parent.y + nodeH, n.x, n.y, n.w, n.color);
          }
        }
        // Draw as node box
        drawNode(n, n.x, n.y, n.w, nodeH);
        // Draw outcome badge below
        if (n.outcome) {
          drawBadge(n, n.x, Y3, n.w);
          // Connector line from node to badge
          const cx = n.x + n.w/2;
          svg += '<line x1="'+cx+'" y1="'+(n.y+nodeH)+'" x2="'+cx+'" y2="'+Y3+'" stroke="'+COLORS[n.color||'dim']+'" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>';
        }
      });

      // Summary bar at bottom
      const sumY = H - 56;
      svg += '<rect x="'+((W-620)/2)+'" y="'+sumY+'" width="620" height="46" rx="8" fill="'+COLORS_DIM.cyan+'" stroke="'+COLORS.cyan+'" stroke-width="0.5" opacity="0.5"/>';
      svg += '<text x="'+(W/2)+'" y="'+(sumY+18)+'" font-family="\'Instrument Serif\', serif" font-size="13" text-anchor="middle" fill="'+COLORS.cyan+'">';
      svg += 'Same model. Same task. Same prompt. The only variable is which path the agent takes.</text>';
      // Best vs worst
      if (l2.length >= 2) {
        const best = l2.reduce((a,b)=>(a.pass_rate||0)>(b.pass_rate||0)?a:b);
        const worst = l2.reduce((a,b)=>(a.pass_rate||0)<(b.pass_rate||0)?a:b);
        svg += '<text x="'+(W/2)+'" y="'+(sumY+34)+'" font-family="\'DM Mono\', monospace" font-size="10" fill="#6b737d" text-anchor="middle">';
        svg += esc(best.label)+': '+Math.round((best.pass_rate||0)*100)+'% success &middot; '+esc(worst.label)+': '+Math.round((worst.pass_rate||0)*100)+'% success</text>';
      }

      svg += '</svg>';
      return svg;
    },
  };
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
