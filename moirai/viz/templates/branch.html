<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>moirai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Martian+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  :root {
    --bg: #13111a;
    --surface: #1a1825;
    --surface-2: #211f2e;
    --border: #2e2b3d;
    --border-subtle: #252336;
    --text: #b8b5c8;
    --text-muted: #726f87;
    --text-bright: #eae8f0;
    --accent: #e0a526;
    --accent-dim: rgba(224,165,38,0.12);
    --pass: #2dd4bf;
    --pass-dim: rgba(45,212,191,0.08);
    --fail: #fb7185;
    --fail-dim: rgba(251,113,133,0.08);
    --display: 'Bricolage Grotesque', system-ui, sans-serif;
    --mono: 'Martian Mono', 'SF Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  [x-cloak] { display: none !important; }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    font-weight: 300;
    line-height: 1.5;
  }

  /* ---- Header ---- */
  .masthead {
    padding: 48px 48px 0;
    display: flex;
    align-items: flex-end;
    gap: 48px;
  }
  .masthead-brand {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: -1px;
    line-height: 1;
  }
  .masthead-sub {
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--text-muted);
    padding-bottom: 3px;
  }
  .stats-row {
    display: flex;
    gap: 32px;
    padding: 20px 48px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .stat-num {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 700;
    color: var(--text-bright);
    line-height: 1;
  }
  .stat-lbl {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ---- Legend ---- */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    padding: 10px 48px;
    border-bottom: 1px solid var(--border-subtle);
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
  }
  .legend-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 400;
    color: var(--text-muted);
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
  }

  /* ---- Content ---- */
  .content { padding: 24px 48px 64px; }

  /* ---- Task panel ---- */
  .task {
    background: var(--surface);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .task-bar {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .task-title {
    font-family: var(--display);
    font-size: 15px;
    font-weight: 600;
    color: var(--text-bright);
  }
  .task-counts {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 6px;
  }
  .cnt-pass { color: var(--pass); font-weight: 500; }
  .cnt-fail { color: var(--fail); font-weight: 500; }

  .interp {
    padding: 10px 24px 0;
    font-size: 11px;
    font-weight: 400;
    font-style: italic;
  }
  .heatmap-wrap { padding: 16px 24px; overflow-x: auto; }

  /* SVG hover */
  .heatmap-row { transition: opacity 0.06s; }
  svg:hover .heatmap-row { opacity: 0.35; }
  svg:hover .heatmap-row:hover { opacity: 1; }

  /* ---- Comparisons ---- */
  .comps { padding: 0 24px 20px; }

  .comp {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: 16px;
    overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .comp.highlighted {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 24px var(--accent-dim);
  }

  .comp-top {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .comp-badge {
    width: 22px;
    height: 22px;
    background: var(--accent);
    color: var(--bg);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    cursor: pointer;
    transition: transform 0.12s;
  }
  .comp-badge:hover { transform: scale(1.2); }

  .comp-narrative {
    font-family: var(--display);
    font-size: 14px;
    font-weight: 400;
    color: var(--text-bright);
    line-height: 1.55;
  }
  .comp-narrative code {
    background: var(--accent-dim);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
  }
  .comp-meta {
    font-size: 10px;
    color: var(--text-muted);
    padding: 0 20px 0 52px;
    margin-top: -4px;
    padding-bottom: 12px;
  }

  /* Reasoning boxes */
  .reasoning-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border-subtle);
    border-top: 1px solid var(--border-subtle);
    border-bottom: 1px solid var(--border-subtle);
  }
  .reasoning-cell {
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 300;
    line-height: 1.55;
    background: var(--surface-2);
  }
  .reasoning-cell.pass-cell { border-left: 2px solid var(--pass); }
  .reasoning-cell.fail-cell { border-left: 2px solid var(--fail); }
  .reasoning-tag {
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .reasoning-text {
    color: var(--text);
    font-style: italic;
  }

  /* Diff table */
  .diff-wrap { padding: 0; }
  .diff { width: 100%; border-collapse: collapse; font-size: 10px; font-weight: 300; }
  .diff th {
    text-align: left;
    padding: 8px 16px;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--surface-2);
    border-bottom: 1px solid var(--border-subtle);
  }
  .diff td {
    padding: 3px 16px;
    border-bottom: 1px solid var(--border-subtle);
    vertical-align: top;
  }
  .diff .row-match td { color: var(--text-muted); }
  .diff .row-diff td { color: var(--text-bright); background: var(--accent-dim); border-left: 2px solid rgba(224,165,38,0.3); }
  .diff .row-first td { background: rgba(224,165,38,0.15); border-left: 2px solid var(--accent); }
  .diff .gap { color: var(--border); }
  .diff .file-detail { color: var(--text-muted); margin-left: 4px; }
  .diff .step-name { font-weight: 400; }

  /* ---- Patterns ---- */
  .patterns {
    background: var(--surface);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    overflow: hidden;
  }
  .patterns-title {
    font-family: var(--display);
    font-size: 15px;
    font-weight: 600;
    color: var(--text-bright);
    padding: 16px 24px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .patterns-body { padding: 16px 24px; }
  .ptable { width: 100%; border-collapse: collapse; font-size: 11px; }
  .ptable th { text-align: left; padding: 6px 8px; color: var(--text-muted); font-weight: 400; font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 1px solid var(--border-subtle); }
  .ptable td { padding: 6px 8px; border-bottom: 1px solid var(--border-subtle); }
  .ptable .pos td { background: var(--pass-dim); }
  .ptable .neg td { background: var(--fail-dim); }

  /* ---- Tooltip ---- */
  .tip {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    max-width: 280px;
  }
  .tip-name { font-size: 11px; font-weight: 500; color: var(--text-bright); }
  .tip-file { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  /* ---- Animations ---- */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .task { animation: fade-up 0.3s ease both; }
  .task:nth-child(2) { animation-delay: 0.05s; }
  .task:nth-child(3) { animation-delay: 0.1s; }
  .task:nth-child(4) { animation-delay: 0.15s; }
  .task:nth-child(5) { animation-delay: 0.2s; }
</style>
</head>
<body x-data="moirai()" x-cloak>

<div class="tip" x-show="tip.show" x-transition.opacity.duration.80ms
     :style="`left:${tip.x}px;top:${tip.y}px`">
  <div class="tip-name" x-text="tip.step"></div>
  <div class="tip-file" x-show="tip.detail" x-text="tip.detail"></div>
</div>

<div class="masthead">
  <div>
    <div class="masthead-brand">moirai</div>
    <div class="masthead-sub">trajectory divergence</div>
  </div>
</div>

<div class="stats-row">
  <div><div class="stat-num" x-text="data.stats.total_runs"></div><div class="stat-lbl">runs</div></div>
  <div><div class="stat-num" x-text="data.stats.pass_rate"></div><div class="stat-lbl">pass rate</div></div>
  <div><div class="stat-num" x-text="data.stats.n_tasks"></div><div class="stat-lbl">mixed tasks</div></div>
  <div><div class="stat-num" x-text="data.stats.n_div"></div><div class="stat-lbl">split points</div></div>
</div>

<div class="legend">
  <template x-for="item in data.legend">
    <span class="legend-chip">
      <span class="legend-dot" :style="`background:${item[1]}`"></span>
      <span x-text="item[0]"></span>
    </span>
  </template>
</div>

<div class="content">

  <template x-for="task in data.tasks" :key="task.id">
    <div class="task" :id="`task-${task.safe_id}`">
      <div class="task-bar">
        <span class="task-title" x-text="task.id"></span>
        <span class="task-counts">
          <span x-text="`${task.n_runs} runs`"></span>
          <span class="cnt-pass" x-text="`${task.n_pass}P`"></span>
          <span class="cnt-fail" x-text="`${task.n_fail}F`"></span>
          <span x-text="`${task.n_cols} cols`"></span>
        </span>
      </div>

      <div x-show="task.interpretation" class="interp"
           :style="`color:var(--${task.interpretation?.level === 'success' ? 'pass' : task.interpretation?.level === 'accent' ? 'accent' : 'text-muted'})`"
           x-text="task.interpretation?.text"></div>

      <div class="heatmap-wrap" x-data x-init="
        let src = document.getElementById('svg-' + task.safe_id);
        if (src) { $el.appendChild(src.firstElementChild.cloneNode(true)); }
      "></div>

      <div x-show="task.comparisons.length" class="comps">
        <template x-for="comp in task.comparisons" :key="comp.number">
          <div class="comp" :id="`fork-${comp.task_id}-${comp.number}`"
               @mouseenter="highlightCol(comp.task_id, comp.column)"
               @mouseleave="clearHighlight()">

            <div class="comp-top">
              <span class="comp-badge"
                    @click="scrollToHeatmap(comp.task_id, comp.number)"
                    x-text="comp.number"></span>
              <div class="comp-narrative" x-show="comp.narrative">
                After <strong x-text="comp.narrative?.n_same"></strong> identical
                step<span x-show="comp.narrative?.n_same !== 1">s</span>, these runs diverge:
                the pass run chose <code x-text="comp.narrative?.pass_action"></code>
                while the fail run chose <code x-text="comp.narrative?.fail_action"></code>.
              </div>
            </div>

            <div class="comp-meta" x-show="comp.p_value || comp.separation">
              <span x-show="comp.p_value" x-text="`p=${comp.p_value}`"></span>
              <span x-show="comp.p_value && comp.separation"> · </span>
              <span x-text="`separation ${comp.separation}`"></span>
            </div>

            <!-- Reasoning -->
            <div x-show="comp.pass_reasoning || comp.fail_reasoning" class="reasoning-grid">
              <div class="reasoning-cell pass-cell">
                <div class="reasoning-tag" style="color:var(--pass)">Pass reasoning</div>
                <div class="reasoning-text" x-text="comp.pass_reasoning ? comp.pass_reasoning.substring(0, 350) : 'No reasoning captured'"></div>
              </div>
              <div class="reasoning-cell fail-cell">
                <div class="reasoning-tag" style="color:var(--fail)">Fail reasoning</div>
                <div class="reasoning-text" x-text="comp.fail_reasoning ? comp.fail_reasoning.substring(0, 350) : 'No reasoning captured'"></div>
              </div>
            </div>

            <!-- Aligned diff -->
            <div class="diff-wrap">
              <table class="diff">
                <tr>
                  <th style="width:50%"><span style="color:var(--pass)">PASS</span> <span x-text="comp.pass_run_id" style="font-weight:300"></span></th>
                  <th style="width:50%"><span style="color:var(--fail)">FAIL</span> <span x-text="comp.fail_run_id" style="font-weight:300"></span></th>
                </tr>
                <template x-for="(row, idx) in comp.rows" :key="idx">
                  <tr :class="row.first_div ? 'row-first' : (row.match ? 'row-match' : 'row-diff')">
                    <td>
                      <template x-if="row.pass.gap"><span class="gap">&mdash;</span></template>
                      <template x-if="!row.pass.gap">
                        <span>
                          <span class="step-name" :style="`color:${row.pass.color || 'inherit'}`" x-text="row.pass.value"></span>
                          <span x-show="row.pass.detail" class="file-detail" x-text="row.pass.detail"></span>
                        </span>
                      </template>
                    </td>
                    <td>
                      <template x-if="row.fail.gap"><span class="gap">&mdash;</span></template>
                      <template x-if="!row.fail.gap">
                        <span>
                          <span class="step-name" :style="`color:${row.fail.color || 'inherit'}`" x-text="row.fail.value"></span>
                          <span x-show="row.fail.detail" class="file-detail" x-text="row.fail.detail"></span>
                        </span>
                      </template>
                    </td>
                  </tr>
                </template>
              </table>
            </div>

          </div>
        </template>
      </div>
    </div>
  </template>

  <!-- Patterns -->
  <div class="patterns">
    <div class="patterns-title">Patterns</div>
    <div class="patterns-body">
      <template x-if="!data.patterns.baseline">
        <p style="color:var(--text-muted)">No outcome data.</p>
      </template>
      <template x-if="data.patterns.baseline && !data.patterns.positive.length && !data.patterns.negative.length">
        <p style="color:var(--text-muted)">No significant patterns (baseline: <span x-text="data.patterns.baseline"></span>).</p>
      </template>
      <template x-if="data.patterns.positive.length || data.patterns.negative.length">
        <div>
          <p style="font-size:10px;color:var(--text-muted);margin-bottom:10px">
            Baseline <span x-text="data.patterns.baseline"></span> across <span x-text="data.patterns.n_known"></span> runs
          </p>
          <table class="ptable">
            <tr><th>Pattern</th><th style="text-align:right">Success</th><th style="text-align:right">Runs</th><th style="text-align:right">p</th></tr>
            <template x-for="m in data.patterns.positive">
              <tr class="pos">
                <td x-text="m.pattern"></td>
                <td style="text-align:right;color:var(--pass);font-weight:500" x-text="m.success_rate"></td>
                <td style="text-align:right;color:var(--text-muted)" x-text="m.runs"></td>
                <td style="text-align:right;color:var(--text-muted)" x-text="m.p"></td>
              </tr>
            </template>
            <template x-for="m in data.patterns.negative">
              <tr class="neg">
                <td x-text="m.pattern"></td>
                <td style="text-align:right;color:var(--fail);font-weight:500" x-text="m.success_rate"></td>
                <td style="text-align:right;color:var(--text-muted)" x-text="m.runs"></td>
                <td style="text-align:right;color:var(--text-muted)" x-text="m.p"></td>
              </tr>
            </template>
          </table>
        </div>
      </template>
    </div>
  </div>

</div>

<script>
const DATA = "__DATA_PLACEHOLDER__";

function moirai() {
  return {
    data: DATA,
    tip: { show: false, x: 0, y: 0, step: '', detail: '' },
    activeCol: null,

    showTip(e, step, detail) {
      this.tip = { show: true, x: e.clientX + 14, y: e.clientY - 10, step, detail: detail || '' };
    },
    moveTip(e) {
      if (this.tip.show) { this.tip.x = e.clientX + 14; this.tip.y = e.clientY - 10; }
    },
    hideTip() { this.tip.show = false; },

    scrollToFork(taskId, num) {
      const el = document.getElementById(`fork-${taskId}-${num}`);
      if (!el) return;
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.add('highlighted');
      setTimeout(() => el.classList.remove('highlighted'), 2200);
    },

    scrollToHeatmap(taskId, num) {
      const svg = document.getElementById(`heatmap-${taskId}`);
      if (!svg) return;
      svg.scrollIntoView({ behavior: 'smooth', block: 'center' });
      const m = svg.querySelector(`[data-div-num="${num}"]`);
      if (m) { const r = m.getAttribute('r'); m.setAttribute('r', '10'); setTimeout(() => m.setAttribute('r', r), 500); }
    },

    highlightCol(taskId, col) {
      this.clearHighlight();
      this.activeCol = { taskId, col };
      const svg = document.getElementById(`heatmap-${taskId}`);
      if (!svg) return;
      svg.querySelectorAll(`[data-col="${col}"]`).forEach(el => {
        el.style.filter = 'brightness(1.6)';
        el.style.stroke = '#e0a526';
        el.style.strokeWidth = '1.5';
      });
    },

    clearHighlight() {
      if (!this.activeCol) return;
      const svg = document.getElementById(`heatmap-${this.activeCol.taskId}`);
      if (svg) svg.querySelectorAll(`[data-col="${this.activeCol.col}"]`).forEach(el => {
        el.style.filter = ''; el.style.stroke = ''; el.style.strokeWidth = '';
      });
      this.activeCol = null;
    }
  };
}
</script>
</body>
</html>
